version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth-service:3001
      - LMS_SERVICE_URL=http://lms-service:3002
      - CRM_SERVICE_URL=http://crm-service:3003
      - FINANCE_SERVICE_URL=http://finance-service:3004
      - AI_SERVICE_URL=http://ai-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - REDIS_URL=redis://redis:6379
    depends_on:
      - auth-service
      - lms-service
      - crm-service
      - finance-service
      - ai-service
      - notification-service
      - redis
    networks:
      - educrm-network

  # Auth Service
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_auth
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key
    depends_on:
      - postgres
      - redis
    networks:
      - educrm-network

  # LMS Service
  lms-service:
    build: ./lms-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_lms
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - educrm-network

  # CRM Service
  crm-service:
    build: ./crm-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_crm
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
    depends_on:
      - postgres
      - redis
      - auth-service
      - notification-service
    networks:
      - educrm-network

  # Finance Service
  finance-service:
    build: ./finance-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_finance
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - STRIPE_SECRET_KEY=sk_test_your_stripe_key
      - PAYPAL_CLIENT_ID=your_paypal_client_id
      - PAYPAL_CLIENT_SECRET=your_paypal_client_secret
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - educrm-network

  # AI Service
  ai-service:
    build: ./ai-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_ai
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - educrm-network

  # Notification Service
  notification-service:
    build: ./notification-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://educrm:password@postgres:5432/educrm_notifications
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - EMAIL_USER=your-email@gmail.com
      - EMAIL_PASS=your-email-password
      - TWILIO_ACCOUNT_SID=your_twilio_sid
      - TWILIO_AUTH_TOKEN=your_twilio_token
      - TWILIO_PHONE_NUMBER=+1234567890
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - educrm-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=educrm
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=educrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - educrm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - educrm-network

  # pgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@educrm.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    depends_on:
      - postgres
    networks:
      - educrm-network

  # Redis Commander (Redis Management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - educrm-network

volumes:
  postgres_data:
  redis_data:

networks:
  educrm-network:
    driver: bridge